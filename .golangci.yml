version: "2"
run:
  timeout: 5m
linters:
  default: all
  disable:
    - depguard
    - durationcheck
    - err113
    - exhaustruct
    - gochecknoglobals
    - mnd
    - musttag
    - nlreturn
    - noctx
    - noinlineerr
    - paralleltest
    - testpackage
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    funlen:
      lines: -1
      statements: 45
    gocritic:
      disabled-checks:
        - exitAfterDefer
    gosec:
      excludes:
        - G706
        - G117
        - G120
    gosmopolitan:
      allow-time-local: true
    varnamelen:
      max-distance: 15
      ignore-decls:
        - db *bbolt.DB
        - w *httptest.ResponseRecorder
        - w http.ResponseWriter
        - r *http.Request
  exclusions:
    generated: lax
    paths:
      - _test\.go
formatters:
  enable:
    - gofumpt
    - golines
  exclusions:
    generated: lax
issues:
  max-same-issues: 0
  max-issues-per-linter: 0
