{{define "config"}}
<div class="grid">
    <div></div> <!--empty column to center next -->
    <div>
        <h1>Configuration</h1>
        <form fx-action="/config/" fx-target="#content" fx-method="post" fx-swap="innerHTML">
            <p><label>Theme</label>
                <select name="theme" id="theme" onchange="changeTheme()">
                    <option>system</option>
                    <option>dark</option>
                    <option>light</option>
                </select>
            </p>
            <p><label>Refresh Rate (minutes)</label>
                <select name="refresh">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option selected>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                </select>
            </p>
            <p>
                <button fx-action="/status/" fx-target="#content" fx-swap="innerHTML">Close</button>
            </p>
        </form>
    </div>
</div>
<img src="images/1x1.png" onload="currentTheme()">
{{end}}
